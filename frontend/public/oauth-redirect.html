<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Conectando con Autodesk…</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: rgba(255, 255, 255, 0.98);
        color: #333;
        border-radius: 12px;
        padding: 2rem 1.75rem;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #333;
      }
      p {
        font-size: 0.9rem;
        color: #555;
        line-height: 1.45;
        margin-bottom: 1.25rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 1rem;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #667eea 0deg,
          #8b72d8 100deg,
          #764ba2 220deg,
          rgba(102, 126, 234, 0.35) 300deg,
          #667eea 360deg
        );
        -webkit-mask: radial-gradient(farthest-side, transparent calc(62% - 1px), #000 62%);
        mask: radial-gradient(farthest-side, transparent calc(62% - 1px), #000 62%);
        animation: arqfi-spin 0.85s linear infinite;
      }
      @keyframes arqfi-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 1.75s;
        }
      }
      .err {
        color: #b71c1c;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }
      a {
        color: #5c6bc0;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="card" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Conectando con Autodesk</h1>
      <p>Redirigiendo al inicio de sesión seguro. Esta pantalla puede mostrarse unos segundos en blanco en el dominio de Autodesk; es normal.</p>
      <p id="err" class="err" hidden></p>
      <p><a id="back" href="./">Volver a la aplicación</a></p>
    </div>
    <script>
      (function () {
        var LOGIN_KEY = 'arqfi_oauth_login_url';
        var ORIGIN_KEY = 'arqfi_oauth_backend_origin';

        function showError(msg) {
          var el = document.getElementById('err');
          el.textContent = msg;
          el.hidden = false;
        }

        function safeLoginUrl(raw, expectedOrigin) {
          if (!raw || typeof raw !== 'string') return null;
          if (raw.indexOf('@') !== -1) return null;
          try {
            var u = new URL(raw);
            if (u.protocol !== 'http:' && u.protocol !== 'https:') return null;
            if (u.hash) return null;
            if (expectedOrigin && u.origin !== expectedOrigin) return null;
            var path = (u.pathname || '').replace(/\/+$/, '') || '/';
            if (path.slice(-11) !== '/auth/login') return null;
            return u.toString();
          } catch (e) {
            return null;
          }
        }

        try {
          var raw = sessionStorage.getItem(LOGIN_KEY);
          var expectedOrigin = sessionStorage.getItem(ORIGIN_KEY);
          sessionStorage.removeItem(LOGIN_KEY);
          sessionStorage.removeItem(ORIGIN_KEY);
          var next = safeLoginUrl(raw, expectedOrigin);
          if (!next) {
            showError('No se pudo iniciar el inicio de sesión. Vuelve a la app y pulsa de nuevo «Iniciar sesión con Autodesk».');
            return;
          }
          var isPopup = new URLSearchParams(window.location.search).get('popup') === '1';
          if (isPopup) {
            var loginU = new URL(next);
            loginU.searchParams.set('popup', '1');
            next = loginU.toString();
          }
          window.location.replace(next);
        } catch (e) {
          showError('Error al preparar la redirección. Prueba de nuevo desde la aplicación.');
        }
      })();
    </script>
  </body>
</html>
