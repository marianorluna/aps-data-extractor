<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Inicio de sesión correcto</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: #f5f5f5;
        color: #333;
        text-align: center;
      }
      p {
        max-width: 360px;
        line-height: 1.45;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <p id="msg">Cerrando ventana…</p>
    <script>
      (function () {
        var TYPE = 'arqfi-oauth-done';
        var origin = window.location.origin;
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: TYPE }, origin);
          }
        } catch (e) {}
        window.close();
        setTimeout(function () {
          var el = document.getElementById('msg');
          if (el && !window.closed) {
            el.textContent =
              'Si la ventana no se cierra sola, ciérrala manualmente y vuelve a la aplicación.';
          }
        }, 600);
      })();
    </script>
  </body>
</html>
