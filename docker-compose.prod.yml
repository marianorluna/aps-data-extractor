version: '3.8'

services:
  # Backend Node.js - Producción
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: revit-extractor-backend-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APS_CLIENT_ID=${APS_CLIENT_ID}
      - APS_CLIENT_SECRET=${APS_CLIENT_SECRET}
      - CALLBACK_URL=${CALLBACK_URL}
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET}
    networks:
      - revit-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React - Producción
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: revit-extractor-frontend-prod
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=${API_BASE_URL:-https://api.tu-dominio.com}
      - REACT_APP_ENV=production
    networks:
      - revit-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx - Reverse Proxy (opcional pero recomendado)
  nginx:
    image: nginx:alpine
    container_name: revit-extractor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - revit-network
    restart: always
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  revit-network:
    driver: bridge

volumes:
  backend-logs:
  frontend-dist:
