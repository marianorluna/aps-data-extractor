<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="APS Data Extractor - Extrae datos de modelos RVT y NWC usando APS" />
    <title>APS Data Extractor</title>
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/arqfi-logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/arqfi-logo.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #f5f5f5;
      }
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
      /* Visible hasta que React monte (p. ej. tras volver del OAuth) */
      .arqfi-initial-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        background: #f5f5f5;
        color: #555;
        text-align: center;
      }
      .arqfi-initial-loader .arqfi-initial-spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #667eea 0deg,
          #8b72d8 100deg,
          #764ba2 220deg,
          rgba(102, 126, 234, 0.35) 300deg,
          #667eea 360deg
        );
        -webkit-mask: radial-gradient(farthest-side, transparent calc(62% - 1px), #000 62%);
        mask: radial-gradient(farthest-side, transparent calc(62% - 1px), #000 62%);
        animation: arqfi-initial-spin 0.85s linear infinite;
      }
      @keyframes arqfi-initial-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .arqfi-initial-loader .arqfi-initial-spinner {
          animation-duration: 1.75s;
        }
      }
      .arqfi-initial-loader strong {
        color: #333;
        font-size: 1rem;
      }
      .arqfi-initial-loader span {
        font-size: 0.9rem;
        max-width: 320px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta app.</noscript>
    <div id="root">
      <div class="arqfi-initial-loader" role="status" aria-live="polite" aria-label="Cargando aplicación">
        <div class="arqfi-initial-spinner" aria-hidden="true"></div>
        <strong>Cargando aplicación…</strong>
        <span>Si acabas de iniciar sesión con Autodesk, esto solo tarda un momento.</span>
      </div>
    </div>
  </body>
</html>
